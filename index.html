<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数刷 Scrub · 数据清洗大师</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="stylesheet" href="assets/css/styles.css"></head>
<body>

<header>
  <div class="hd-brand">
    <h1>数刷 Scrub</h1>
    <span class="sub">数据清洗大师</span>
  </div>
  <div class="hd-actions">
    <button class="btn sm" onclick="document.getElementById('cfg-input').click()">导入配置</button>
    <button class="btn sm" onclick="exportConfig()">导出配置</button>
    <div class="hd-sep"></div>
    <button class="btn pri sm" onclick="exportFile()" id="btn-export" disabled>导出文件</button>
    <input type="file" id="cfg-input" accept=".json" style="display:none" onchange="importConfig(event)">
  </div>
</header>

<div class="main">

  <!-- FILE -->
  <div class="card">
    <div class="card-hd"><h2>导入文件</h2><span class="step">STEP 01</span></div>
    <div class="card-bd">
      <div id="upload-area">
        <div class="drop-zone" id="drop-zone">
          <div class="drop-icon">⊞</div>
          <p><strong>点击选择</strong>或拖拽文件到此处</p>
          <p style="margin-top:3px">支持 .xlsx · .xls · .csv</p>
        </div>
      </div>
      <input type="file" id="file-input" accept=".xlsx,.xls,.csv">
      <div id="stats-wrap" style="display:none">
        <div class="stats-row" id="stats-row"></div>
      </div>
    </div>
  </div>

  <!-- TYPE PILLS (outside, above ops card) -->
  <div id="type-pills" style="display:none">
    <div class="pills-bar">
      <span class="pills-lbl">添加操作</span>
      <button class="pill" onclick="addOpOfType('dedup')">去重</button>
      <button class="pill" onclick="addOpOfType('replace')">替换</button>
      <button class="pill" onclick="addOpOfType('delrow')">删行</button>
      <button class="pill" onclick="addOpOfType('delcol')">删列</button>
      <button class="pill" onclick="addOpOfType('addcol')">加列</button>
    </div>
  </div>

  <!-- OPS CARD -->
  <div class="card" id="ops-card" style="display:none">
    <div class="card-hd"><h2>处理操作</h2><span class="step">STEP 02</span></div>

    <!-- global bar -->
    <div class="global-bar">
      <button class="btn sm danger" onclick="runAll('exec')">▶ 执行全部</button>
      <div class="global-sep"></div>
      <button class="btn sm" id="btn-undo" onclick="undoLast()" disabled>↩ 撤回</button>
      <span id="undo-label" style="font-size:11px;color:var(--light)"></span>
      <div class="global-sep"></div>
      <button class="btn sm" onclick="clearOps()">清空操作</button>
    </div>

    <div id="type-groups"></div>
    <div id="ops-empty" class="empty-hint" style="display:none">暂无操作，从上方添加</div>
  </div>


</div>
<div class="toast" id="toast"></div>

<script src="assets/js/app.js"></script></body>
</html>
