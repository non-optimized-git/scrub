<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数刷 Scrub · 数据清洗大师</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="stylesheet" href="assets/css/styles.css"></head>
<body>

<header>
  <h1>数刷 Scrub</h1>
  <span class="sub">数据清洗大师</span>
</header>

<div class="main">

  <!-- FILE -->
  <div class="card">
    <div class="card-hd"><h2>导入文件</h2><span class="step">STEP 01</span></div>
    <div class="card-bd">
      <div id="upload-area">
        <div class="drop-zone" id="drop-zone">
          <div class="drop-icon">⊞</div>
          <p><strong>点击选择</strong>或拖拽文件到此处</p>
          <p style="margin-top:3px">支持 .xlsx · .xls · .csv</p>
        </div>
      </div>
      <input type="file" id="file-input" accept=".xlsx,.xls,.csv">
      <div id="stats-wrap" style="display:none">
        <div class="stats-row" id="stats-row"></div>
      </div>
    </div>
  </div>

  <!-- ADD-OP BAR (outside, above ops card) -->
  <div id="add-op-wrap" style="display:none">
    <div class="add-op-bar">
      <select class="op-type-sel" id="op-type-sel">
        <option value="">选择操作类型…</option>
        <option value="dedup">删除相邻重复行（第4列起）</option>
        <option value="replace">文字替换</option>
        <option value="delrow">删除含关键词的整行</option>
        <option value="delcol">删除列</option>
        <option value="addcol">在某列后添加空白列</option>
      </select>
      <button class="btn pri sm" onclick="addOp()">＋ 添加</button>
    </div>
  </div>

  <!-- OPS CARD -->
  <div class="card" id="ops-card" style="display:none">
    <div class="card-hd"><h2>处理操作</h2><span class="step">STEP 02</span></div>

    <!-- global bar -->
    <div class="global-bar">
      <button class="btn sm" onclick="runAll('analyze')">▷ 全部分析</button>
      <button class="btn sm danger" onclick="runAll('exec')">▶ 全部执行</button>
      <div class="global-sep"></div>
      <button class="btn sm" id="btn-undo" onclick="undoLast()" disabled>↩ 撤回</button>
      <span id="undo-label" style="font-size:11px;color:var(--light)"></span>
    </div>

    <div id="type-groups"></div>
    <div id="ops-empty" class="empty-hint" style="display:none">暂无操作，从上方添加</div>
  </div>

  <!-- CONFIG -->
  <div class="card">
    <div class="card-hd"><h2>配置管理</h2><span class="step">STEP 03</span></div>
    <div class="card-bd">
      <p style="font-size:12px;color:var(--muted);margin-bottom:12px">导出操作配置（含列名记忆），下次导入新文件后直接复用</p>
      <div class="cfg-row">
        <button class="btn pri sm" onclick="exportConfig()">导出配置</button>
        <button class="btn sm" onclick="document.getElementById('cfg-input').click()">导入配置</button>
        <button class="btn sm" onclick="clearOps()">清空操作</button>
        <input type="file" id="cfg-input" accept=".json" style="display:none" onchange="importConfig(event)">
        <span id="cfg-status" style="font-size:11px;color:var(--muted)"></span>
      </div>
    </div>
  </div>

  <!-- EXPORT -->
  <div class="card">
    <div class="card-hd"><h2>导出文件</h2><span class="step">STEP 04</span></div>
    <div class="card-bd">
      <div style="display:flex;gap:12px;align-items:center">
        <button class="btn pri" onclick="exportFile()" id="btn-export" disabled>下载处理后的文件</button>
        <span style="font-size:12px;color:var(--muted)">文件名自动添加「_处理后」标识</span>
      </div>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script src="assets/js/app.js"></script></body>
</html>
